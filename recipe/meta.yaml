{% set name = "csaps" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/csaps-{{ version }}.tar.gz
  sha256: 236dfb52c15fd60e3da655577fcaf1aaedf6bd0e4bf10404bd2cb481ef25c4d1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }},<4.0
    - numpy >=1.11.0,<2
    - scipy >=1.0.0,<2

test:
  imports:
    - csaps
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/espdev/csaps
  summary: Cubic spline approximation (smoothing)
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - smithsp
    - kalling
